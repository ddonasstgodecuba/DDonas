<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DDonas Business OS</title>

<style>
:root{
  --accent:#ff3f86;
  --accent2:#6c5ce7;
  --bg:linear-gradient(180deg,#fff,#ffe6f1,#e9ddff);
  --card:rgba(255,255,255,.75);
  --shadow:0 20px 50px rgba(0,0,0,.10);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
}

body{
  background:var(--bg);
  color:#1c1c1e;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

input{
  padding:12px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
  width:220px;
}

button{
  margin-top:10px;
  padding:10px 14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:.2s;
}

.btn{
  background:var(--accent);
  color:#fff;
}

.btn:hover{transform:scale(1.05);}

/* DASHBOARD */
#app{
  display:none;
  padding:20px;
}

header{
  text-align:center;
  margin-bottom:20px;
}

h1{
  font-family:"Brush Script MT","Segoe Script",cursive;
  color:var(--accent);
  font-size:54px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:15px;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
}

.card{
  background:var(--card);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:15px;
  box-shadow:var(--shadow);
}

/* PRODUCT */
.product{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
  padding:8px;
  border-bottom:1px solid rgba(0,0,0,.05);
}

/* ORDER */
.order{
  background:#fff;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
  box-shadow:var(--shadow);
}

/* FLOAT */
.float{
  position:fixed;
  right:18px;
  bottom:18px;
  background:#25d366;
  width:58px;
  height:58px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:26px;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>🔐 Acceso Admin</h2>
  <input type="password" id="pin" placeholder="PIN"/>
  <button class="btn" onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app">

<header>
  <h1>DDonas OS</h1>
</header>

<div class="grid">

  <!-- PRODUCTOS -->
  <div class="card">
    <h3>🍩 Productos</h3>

    <input id="name" placeholder="Nombre"/>
    <input id="emoji" placeholder="Emoji"/>
    <input id="price" placeholder="Precio"/>

    <button class="btn" onclick="addProduct()">Agregar</button>

    <div id="products"></div>
  </div>

  <!-- PEDIDOS -->
  <div class="card">
    <h3>🧾 Pedido activo</h3>
    <div id="cart"></div>
    <button class="btn" onclick="checkout()">Enviar WhatsApp</button>
  </div>

  <!-- HISTORIAL -->
  <div class="card">
    <h3>📊 Ventas</h3>
    <div id="orders"></div>
  </div>

</div>

</div>

<a class="float">💬</a>

<script>

const PIN = "1234";

let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"Choco Velvet", emoji:"🍫", price:1},
  {name:"Vainilla Cloud", emoji:"🍦", price:1}
];

let cart = {};
let orders = JSON.parse(localStorage.getItem("orders")) || [];

/* LOGIN */
function login(){
  const v = document.getElementById("pin").value;
  if(v === PIN){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    render();
  }else{
    alert("PIN incorrecto");
  }
}

/* SAVE */
function save(){
  localStorage.setItem("products",JSON.stringify(products));
  localStorage.setItem("orders",JSON.stringify(orders));
}

/* PRODUCTS */
function addProduct(){
  products.push({
    name:document.getElementById("name").value,
    emoji:document.getElementById("emoji").value,
    price:Number(document.getElementById("price").value)
  });
  save();
  render();
}

/* ADD CART */
function add(i){
  cart[i] = (cart[i]||0)+1;
  render();
}

/* REMOVE */
function remove(i){
  delete cart[i];
  render();
}

/* CHECKOUT */
function checkout(){

  let msg = "Pedido DDonas:\n\n";
  let total = 0;

  Object.keys(cart).forEach(i=>{
    const p = products[i];
    msg += `${p.emoji} ${p.name} x${cart[i]}\n`;
    total += p.price * cart[i];
  });

  msg += `\nTotal: $${total}`;

  const order = {
    id:Date.now(),
    text:msg,
    total
  };

  orders.unshift(order);
  save();

  window.open(
    "https://wa.me/55123300?text="+encodeURIComponent(msg),
    "_blank"
  );

  cart = {};
  render();
}

/* RENDER */
function render(){

  const p = document.getElementById("products");
  const c = document.getElementById("cart");
  const o = document.getElementById("orders");

  p.innerHTML="";
  c.innerHTML="";
  o.innerHTML="";

  products.forEach((x,i)=>{
    p.innerHTML += `
      <div class="product">
        ${x.emoji} ${x.name}
        <button onclick="add(${i})">+</button>
      </div>
    `;
  });

  Object.keys(cart).forEach(i=>{
    const x = products[i];
    c.innerHTML += `
      <div class="order">
        ${x.emoji} ${x.name} x${cart[i]}
        <button onclick="remove(${i})">x</button>
      </div>
    `;
  });

  orders.slice(0,5).forEach(o=>{
    o.innerHTML += `
      <div class="order">
        💰 $${o.total}
      </div>
    `;
  });

}

</script>

</body>
</html>
