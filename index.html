<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DDonas Pro</title>

<style>
:root{
  --accent:#ff3f86;
  --bg:linear-gradient(180deg,#fff,#ffe6f1,#e9ddff);
  --card:rgba(255,255,255,.75);
  --shadow:0 20px 50px rgba(0,0,0,.10);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
  background:var(--bg);
  color:#1c1c1e;
}

/* HEADER */
header{
  text-align:center;
  padding:30px;
}

h1{
  font-family:"Brush Script MT","Segoe Script",cursive;
  color:var(--accent);
  font-size:54px;
}

/* ADMIN BUTTON */
#adminBtn{
  position:fixed;
  top:15px;
  right:15px;
  width:42px;
  height:42px;
  border-radius:50%;
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(10px);
  box-shadow:var(--shadow);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:18px;
  z-index:10;
  transition:.2s;
}

#adminBtn:hover{
  transform:scale(1.1);
}

/* MODAL */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}

.modal-box{
  background:#fff;
  padding:20px;
  border-radius:20px;
  width:260px;
  box-shadow:var(--shadow);
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid #ddd;
  margin-top:10px;
}

button{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:#fff;
  cursor:pointer;
}

/* ADMIN PANEL */
#adminPanel{
  display:none;
  max-width:900px;
  margin:20px auto;
  padding:20px;
}

.card{
  background:var(--card);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:15px;
  box-shadow:var(--shadow);
  margin-bottom:15px;
}

/* SHOP */
.shop{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.item{
  background:#fff;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
  box-shadow:var(--shadow);
}

.float{
  position:fixed;
  right:18px;
  bottom:18px;
  background:#25d366;
  width:58px;
  height:58px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:26px;
  text-decoration:none;
  box-shadow:var(--shadow);
}
</style>
</head>

<body>

<!-- BOTÓN ADMIN ESQUINA -->
<div id="adminBtn" onclick="openModal()">⚙️</div>

<!-- MODAL PIN -->
<div id="modal">
  <div class="modal-box">
    <h3>Acceso Admin</h3>
    <input id="pin" type="password" placeholder="PIN"/>
    <button onclick="login()">Entrar</button>
    <button onclick="closeModal()" style="background:#ccc;color:#000">Cerrar</button>
  </div>
</div>

<header>
  <h1>DDonas</h1>
</header>

<!-- TIENDA CLIENTE -->
<div class="shop">
  <div id="products"></div>
</div>

<!-- ADMIN PANEL OCULTO -->
<div id="adminPanel">

  <div class="card">
    <h3>Panel Admin</h3>

    <input id="name" placeholder="Nombre"/>
    <input id="emoji" placeholder="Emoji"/>
    <input id="price" placeholder="Precio"/>

    <button onclick="add()">Agregar producto</button>
  </div>

  <div class="card">
    <h3>Productos</h3>
    <div id="list"></div>
  </div>

</div>

<a class="float">💬</a>

<script>

const PIN = "1234";

let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"Choco Velvet",emoji:"🍫",price:1},
  {name:"Vainilla Cloud",emoji:"🍦",price:1}
];

let cart = {};

/* MODAL */
function openModal(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* LOGIN */
function login(){
  const v = document.getElementById("pin").value;

  if(v === PIN){
    document.getElementById("adminPanel").style.display="block";
    closeModal();
    render();
  }else{
    alert("PIN incorrecto");
  }
}

/* ADMIN */
function add(){
  products.push({
    name:document.getElementById("name").value,
    emoji:document.getElementById("emoji").value,
    price:Number(document.getElementById("price").value)
  });

  save();
  render();
}

function del(i){
  products.splice(i,1);
  save();
  render();
}

/* SAVE */
function save(){
  localStorage.setItem("products",JSON.stringify(products));
}

/* SHOP */
function render(){

  const p = document.getElementById("products");
  const l = document.getElementById("list");

  p.innerHTML="";
  l.innerHTML="";

  products.forEach((x,i)=>{

    p.innerHTML += `
      <div class="item">
        ${x.emoji} ${x.name} - $${x.price}
        <button onclick="addCart(${i})">+</button>
      </div>
    `;

    l.innerHTML += `
      <div class="item">
        ${x.emoji} ${x.name}
        <button onclick="del(${i})">x</button>
      </div>
    `;
  });

}

/* CART SIMPLE */
function addCart(i){
  let msg = "Quiero: " + products[i].emoji + " " + products[i].name;

  window.open(
    "https://wa.me/55123300?text="+encodeURIComponent(msg),
    "_blank"
  );
}

render();

</script>

</body>
</html>
