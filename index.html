<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DDonas Admin + Tienda</title>

<style>
:root{
  --accent:#ff3f86;
  --accent2:#6c5ce7;
  --bg:linear-gradient(180deg,#fff,#ffe6f1,#e9ddff);
  --card:rgba(255,255,255,.75);
  --shadow:0 20px 50px rgba(0,0,0,.10);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
}

body{
  background:var(--bg);
  color:#1c1c1e;
}

/* HEADER */
header{
  text-align:center;
  padding:30px;
}

h1{
  font-family:"Brush Script MT","Segoe Script",cursive;
  color:var(--accent);
  font-size:52px;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  max-width:1200px;
  margin:auto;
  padding:20px;
}

@media(max-width:900px){
  .container{grid-template-columns:1fr;}
}

/* CARD */
.card{
  background:var(--card);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:15px;
  box-shadow:var(--shadow);
}

/* PRODUCTOS */
.product{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-bottom:1px solid rgba(0,0,0,.05);
}

.product span{
  font-size:14px;
}

/* BUTTONS */
button{
  border:none;
  cursor:pointer;
  border-radius:12px;
  padding:8px 10px;
  transition:.2s;
}

.btn{
  background:var(--accent);
  color:#fff;
}

.btn:hover{transform:scale(1.05);}

.small{
  background:#eee;
}

.small:hover{background:#ddd;}

/* FORM */
input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:12px;
  border:1px solid #ddd;
  outline:none;
}

h3{
  margin-bottom:10px;
}

/* SHOP */
.shop{
  margin-top:10px;
}

.item{
  background:#fff;
  padding:10px;
  border-radius:14px;
  margin-bottom:10px;
  box-shadow:var(--shadow);
}

.qty{
  display:flex;
  gap:10px;
  align-items:center;
  margin-top:8px;
}

.float{
  position:fixed;
  right:18px;
  bottom:18px;
  background:#25d366;
  width:58px;
  height:58px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:26px;
  text-decoration:none;
  box-shadow:var(--shadow);
}
</style>
</head>

<body>

<header>
  <h1>DDonas Admin</h1>
</header>

<div class="container">

  <!-- PANEL ADMIN -->
  <div class="card">
    <h3>🍩 Panel Admin</h3>

    <input id="name" placeholder="Nombre producto"/>
    <input id="emoji" placeholder="Emoji (🍫🍓🍦)"/>
    <input id="price" placeholder="Precio"/>
    <select id="cat">
      <option value="choco">Chocolate</option>
      <option value="vainilla">Vainilla</option>
      <option value="glaseado">Glaseado</option>
    </select>

    <button class="btn" onclick="addProduct()">Agregar</button>

    <div id="adminList"></div>
  </div>

  <!-- TIENDA -->
  <div class="card">
    <h3>🛒 Tienda</h3>
    <div id="shop"></div>

    <button class="btn" onclick="sendWA()">Enviar WhatsApp</button>
  </div>

</div>

<a class="float">💬</a>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [
  {name:"Choco Velvet", emoji:"🍫", price:1.0, cat:"choco"},
  {name:"Vainilla Cloud", emoji:"🍦", price:1.0, cat:"vainilla"}
];

let cart = {};

/* GUARDAR */
function save(){
  localStorage.setItem("products", JSON.stringify(products));
}

/* ADMIN */
function addProduct(){
  const p = {
    name:document.getElementById("name").value,
    emoji:document.getElementById("emoji").value,
    price:document.getElementById("price").value,
    cat:document.getElementById("cat").value
  };

  products.push(p);
  save();
  render();
}

/* DELETE */
function del(i){
  products.splice(i,1);
  save();
  render();
}

/* CART */
function addCart(i){
  const key = i;
  cart[key] = (cart[key] || 0) + 1;
  renderShop();
}

/* SHOP */
function renderShop(){
  const shop = document.getElementById("shop");
  shop.innerHTML = "";

  products.forEach((p,i)=>{
    shop.innerHTML += `
      <div class="item">
        <b>${p.emoji} ${p.name}</b><br/>
        $${p.price}
        <div class="qty">
          <button class="small" onclick="addCart(${i})">+</button>
          <span>${cart[i]||0}</span>
        </div>
      </div>
    `;
  });
}

/* ADMIN LIST */
function renderAdmin(){
  const a = document.getElementById("adminList");
  a.innerHTML = "";

  products.forEach((p,i)=>{
    a.innerHTML += `
      <div class="product">
        <span>${p.emoji} ${p.name}</span>
        <button class="small" onclick="del(${i})">x</button>
      </div>
    `;
  });
}

/* WHATSAPP */
function sendWA(){
  let msg = "Pedido:\n\n";
  let total = 0;

  products.forEach((p,i)=>{
    if(cart[i]){
      msg += `${p.emoji} ${p.name} x${cart[i]}\n`;
      total += cart[i];
    }
  });

  msg += `\nTotal unidades: ${total}`;

  window.open(
    "https://wa.me/55123300?text=" + encodeURIComponent(msg),
    "_blank"
  );
}

/* INIT */
function render(){
  renderAdmin();
  renderShop();
}

render();

</script>

</body>
</html>
